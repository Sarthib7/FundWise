<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FundWise — App Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--surface:#161b22;--surface-2:#21262d;--border:#30363d;
  --text:#f0f6fc;--text-2:#8b949e;--text-3:#484f58;
  --cyan:oklch(75% 0.15 195);--cyan-dim:oklch(75% 0.15 195 / 0.12);--cyan-border:oklch(75% 0.15 195 / 0.25);
  --purple:oklch(65% 0.18 290);--purple-dim:oklch(65% 0.18 290 / 0.12);--purple-border:oklch(65% 0.18 290 / 0.25);
  --green:oklch(70% 0.18 155);--red:oklch(65% 0.20 25);
  --fh:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--fb);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:40px 24px;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(48,54,61,0.3) 1px,transparent 1px),linear-gradient(90deg,rgba(48,54,61,0.3) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
}
#root{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px;}

/* ── APP SHELL (fills the iOS frame) ── */
.app{width:100%;height:100%;background:var(--bg);overflow:hidden;display:flex;flex-direction:column;position:relative;font-family:var(--fb);}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.25s;}
.screen.s-right{transform:translateX(100%);opacity:0;pointer-events:none;}
.screen.s-left{transform:translateX(-30%);opacity:0;pointer-events:none;}
.screen.s-active{transform:translateX(0);opacity:1;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;flex-shrink:0;}
.topbar-title{font-family:var(--fh);font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.back-btn{display:flex;align-items:center;gap:4px;color:var(--cyan);font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;font-family:var(--fb);padding:4px 0;}
.icon-btn{width:32px;height:32px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}

/* scroll */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

/* bottom nav */
.btm-nav{display:flex;align-items:center;padding:8px 0 4px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:500;color:var(--text-3);cursor:pointer;padding:4px 0;transition:color 0.15s;}
.nav-item.on{color:var(--cyan);}
.nav-ico{font-size:19px;line-height:1;}

/* wallet screen */
.wallet-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;text-align:center;flex:1;}
.w-h1{font-family:var(--fh);font-size:24px;font-weight:700;letter-spacing:-0.5px;margin:24px 0 8px;}
.w-sub{font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:36px;max-width:240px;}
.w-btns{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.w-btn{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--fb);display:flex;align-items:center;gap:10px;transition:all 0.15s;}
.w-btn-icon{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.w-terms{font-size:10px;color:var(--text-3);line-height:1.5;}

/* home */
.home-hdr{padding:16px 20px 0;}
.home-greet{font-size:12px;color:var(--text-2);}
.home-name{font-family:var(--fh);font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-top:2px;}
.home-addr{font-size:10px;color:var(--text-3);margin-top:2px;font-family:monospace;}

.net-card{margin:14px 20px;padding:18px;border-radius:16px;background:var(--surface);border:1px solid var(--border);}
.net-lbl{font-size:11px;color:var(--text-2);margin-bottom:4px;}
.net-amt{font-family:var(--fh);font-size:30px;font-weight:700;letter-spacing:-1px;}
.net-sub{font-size:11px;color:var(--text-2);margin-top:3px;}

.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px;}
.sec-hdr-t{font-family:var(--fh);font-size:14px;font-weight:600;}
.sec-hdr-a{font-size:12px;color:var(--cyan);font-weight:500;cursor:pointer;background:none;border:none;font-family:var(--fb);}

.grp-card{margin:0 20px 8px;padding:14px;border-radius:14px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:10px;}
.grp-card:active{transform:scale(0.98);}
.grp-emoji{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.grp-info{flex:1;min-width:0;}
.grp-name{font-family:var(--fh);font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.grp-meta{font-size:11px;color:var(--text-2);margin-top:1px;}
.grp-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;}
.b-split{background:var(--cyan-dim);color:var(--cyan);border:1px solid var(--cyan-border);}
.b-fund{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple-border);}
.grp-bal{font-family:var(--fh);font-size:14px;font-weight:600;margin-top:4px;text-align:right;}

.fab{position:absolute;bottom:76px;right:18px;width:50px;height:50px;border-radius:50%;background:var(--cyan);color:#0d1117;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px oklch(75% 0.15 195 / 0.4);z-index:10;transition:transform 0.15s;}
.fab:active{transform:scale(0.95);}

/* split detail */
.bal-strip{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;}
.bal-strip::-webkit-scrollbar{display:none;}
.bal-chip{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 12px;min-width:90px;}
.bal-chip-n{font-size:10px;color:var(--text-2);margin-bottom:3px;}
.bal-chip-v{font-family:var(--fh);font-size:15px;font-weight:700;}

.settle-banner{margin:0 20px 12px;padding:12px 14px;border-radius:11px;background:oklch(70% 0.18 155 / 0.08);border:1px solid oklch(70% 0.18 155 / 0.25);display:flex;align-items:center;gap:10px;cursor:pointer;}
.settle-banner:active{background:oklch(70% 0.18 155 / 0.14);}

.exp-list{padding:0 20px 100px;}
.exp-day{font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:10px 0 5px;}
.exp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.exp-row:last-child{border-bottom:none;}
.exp-ico{width:36px;height:36px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.exp-main{flex:1;min-width:0;}
.exp-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exp-who{font-size:10px;color:var(--text-2);}
.exp-rt{text-align:right;}
.exp-total{font-family:var(--fh);font-size:13px;font-weight:600;}
.exp-share{font-size:10px;}

/* bottom action bar */
.action-bar{padding:10px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.btn-full{width:100%;padding:14px;border-radius:11px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--fb);letter-spacing:-0.2px;transition:all 0.15s;}
.btn-cyan{background:var(--cyan);color:#0d1117;}
.btn-cyan:active{filter:brightness(1.1);}
.btn-purple{background:var(--purple);color:#fff;}
.btn-ghost{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);}

/* settle up */
.settle-card{margin:14px 20px 10px;padding:20px;border-radius:16px;background:var(--surface);border:1px solid var(--border);}
.settle-ppl{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.settle-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--surface-2);border:1px solid var(--border);}
.settle-arrow-txt{flex:1;text-align:center;}
.settle-pays{font-size:10px;color:var(--text-3);}
.settle-pays-amt{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--cyan);}
.settle-name{font-size:10px;color:var(--text-2);text-align:center;margin-top:3px;}

/* tx states */
.tx-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;flex:1;}
.tx-spinner{width:56px;height:56px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--cyan);animation:spin 1s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.tx-ok{width:56px;height:56px;border-radius:50%;background:oklch(70% 0.18 155 / 0.15);border:2px solid oklch(70% 0.18 155 / 0.4);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px;}
.tx-h1{font-family:var(--fh);font-size:20px;font-weight:700;letter-spacing:-0.3px;margin-bottom:6px;}
.tx-sub{font-size:13px;color:var(--text-2);margin-bottom:20px;line-height:1.6;}
.tx-sig{font-size:9px;font-family:monospace;color:var(--text-3);background:var(--surface);padding:8px 12px;border-radius:8px;border:1px solid var(--border);word-break:break-all;margin-bottom:20px;text-align:left;width:100%;}
.tx-sig-lbl{font-size:9px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;}

/* fund detail */
.treasury-card{margin:14px 20px;padding:20px;border-radius:16px;background:linear-gradient(135deg,var(--purple-dim),oklch(65% 0.18 290 / 0.04));border:1px solid var(--purple-border);}
.t-lbl{font-size:10px;color:var(--purple);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.t-amt{font-family:var(--fh);font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:3px;}
.t-sub{font-size:11px;color:var(--text-2);}
.t-bar-wrap{margin-top:14px;}
.t-bar-lbls{display:flex;justify-content:space-between;font-size:10px;color:var(--text-2);margin-bottom:5px;}
.t-bar{height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden;}
.t-bar-fill{height:100%;border-radius:3px;background:var(--purple);}

.mbr-strip{display:flex;gap:10px;padding:12px 20px;overflow-x:auto;}
.mbr-strip::-webkit-scrollbar{display:none;}
.mbr-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mbr-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--surface-2);border:2px solid var(--border);}
.mbr-name{font-size:9px;color:var(--text-2);}
.mbr-contrib{font-size:10px;font-weight:600;}

.prop-list{padding:0 20px 100px;}
.prop-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:8px;cursor:pointer;}
.prop-card:active{border-color:var(--purple-border);}
.prop-hd{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;}
.prop-title{font-family:var(--fh);font-size:14px;font-weight:600;letter-spacing:-0.2px;}
.prop-memo{font-size:11px;color:var(--text-2);margin-top:1px;}
.prop-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;}
.ps-pending{background:oklch(80% 0.15 80 / 0.15);color:oklch(80% 0.15 80);border:1px solid oklch(80% 0.15 80 / 0.3);}
.ps-approved{background:oklch(70% 0.18 155 / 0.15);color:var(--green);border:1px solid oklch(70% 0.18 155 / 0.3);}
.ps-executed{background:var(--cyan-dim);color:var(--cyan);border:1px solid var(--cyan-border);}
.prop-amt{font-family:var(--fh);font-size:16px;font-weight:700;margin-bottom:7px;}
.prop-bar{height:3px;background:var(--surface-2);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.prop-bar-fill{height:100%;border-radius:2px;}
.prop-votes{display:flex;gap:6px;}
.vote-btn{flex:1;padding:9px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);font-family:var(--fb);transition:all 0.15s;}
.vote-btn:active{transform:scale(0.97);}

/* sheet */
.sheet-ov{position:absolute;inset:0;background:rgba(0,0,0,0.65);z-index:50;display:flex;align-items:flex-end;transition:opacity 0.25s;}
.sheet-ov.gone{opacity:0;pointer-events:none;}
.sheet{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:18px 20px 36px;transform:translateY(0);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);}
.sheet-ov.gone .sheet{transform:translateY(100%);}
.sheet-handle{width:32px;height:3px;border-radius:2px;background:var(--border);margin:0 auto 16px;}
.sheet-title{font-family:var(--fh);font-size:17px;font-weight:700;letter-spacing:-0.3px;margin-bottom:16px;}
.fld{margin-bottom:12px;}
.fld-lbl{font-size:10px;color:var(--text-2);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
.fld-input{width:100%;padding:11px 13px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:14px;font-family:var(--fb);outline:none;transition:border-color 0.15s;}
.fld-input:focus{border-color:var(--cyan);}
.fld-input::placeholder{color:var(--text-3);}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;}
.pill-btn{padding:7px 12px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:var(--fb);}
.pill-btn.on-c{background:var(--cyan-dim);border-color:var(--cyan-border);color:var(--cyan);}
.pill-btn.on-p{background:var(--purple-dim);border-color:var(--purple-border);color:var(--purple);}

/* onboard */
.onboard-wrap{flex:1;overflow-y:auto;padding:24px 24px 40px;}
.step-dots{display:flex;gap:5px;margin-bottom:20px;}
.step-dot{height:5px;border-radius:3px;background:var(--border);transition:all 0.25s;}
.step-dot.on{background:var(--cyan);width:18px;}
.step-dot:not(.on){width:5px;}
.ob-h1{font-family:var(--fh);font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:7px;}
.ob-sub{font-size:13px;color:var(--text-2);margin-bottom:28px;line-height:1.6;}
.mode-pick{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.mode-card{padding:16px;border-radius:13px;background:var(--surface);border:2px solid var(--border);cursor:pointer;transition:all 0.15s;}
.mode-card.sel-c{border-color:var(--cyan);background:var(--cyan-dim);}
.mode-card.sel-p{border-color:var(--purple);background:var(--purple-dim);}
.mode-card-t{font-family:var(--fh);font-size:14px;font-weight:600;margin-bottom:4px;}
.mode-card-d{font-size:11px;color:var(--text-2);line-height:1.5;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ── DATA ──
const GROUPS = [

  },
];

// ── LOGO ──
const Logo = ({size=24}) => (
  <svg width={size} height={size} viewBox="0 0 28 28" fill="none">
    <path d="M14 2 L26 14 L14 26 Z" fill="oklch(75% 0.15 195)"/>
    <path d="M14 2 L2 14 L14 26 Z" fill="oklch(65% 0.18 290)"/>
    <line x1="14" y1="2" x2="14" y2="26" stroke="#0d1117" strokeWidth="1.5"/>
  </svg>
);

// ── WALLET CONNECT ──
function WalletScreen({onConnect}) {
  const [busy, setBusy] = useState(null);
  const connect = (w) => { setBusy(w); setTimeout(()=>{ setBusy(null); onConnect(); }, 1400); };
  const wallets = [

// ── MAIN ──
function App() {
  const [screen, setScreen] = useState('wallet');
  const [group, setGroup] = useState(null);
  const [stack, setStack] = useState([]);

  const push = (s, g=null) => { setStack(st=>[...st,screen]); if(g)setGroup(g); setScreen(s); };
  const pop  = () => { const st=[...stack]; const prev=st.pop()||'home'; setStack(st); setScreen(prev); if(prev==='home')setGroup(null); };

  return (
    <div className="app">
      {screen==='wallet'  && <WalletScreen onConnect={()=>push('home')}/>}
      {screen==='onboard' && <OnboardScreen onDone={()=>{setStack([]);setScreen('home');}}/>}
      {screen==='home'    && <HomeScreen onGroup={g=>push(g.mode==='split'?'split':'fund',g)} onNewGroup={()=>push('onboard')}/>}
      {screen==='split'   && group && <SplitGroupScreen group={group} onBack={pop} onSettle={()=>push('settle',group)}/>}
      {screen==='settle'  && group && <SettleUpScreen group={group} onBack={pop}/>}
      {screen==='fund'    && group && <FundGroupScreen group={group} onBack={pop}/>}
    </div>
  );
}
